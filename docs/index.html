    <script>
        function updateProgress() {
            let total = 20;
            let answered = 0;
            for (let i = 1; i <= total; i++) {
                if (document.querySelector(`input[name="q${i}"]:checked`)) answered++;
            }
            let percent = (answered / total) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressBar').innerText = Math.round(percent) + '%';
        }

        function checkQuiz() {
            let score = 0;
            for (let i = 1; i <= 20; i++) {
                let val = document.querySelector(`input[name="q${i}"]:checked`);
                if (val && val.value === "1") score++;
            }
            let resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.classList.remove('alert-success', 'alert-warning', 'alert-danger');
            if (score >= 16) {
                resultDiv.innerHTML = `<strong class="glow">${score}/20 — Профи! 🚀</strong><br>Ты отлично защищён!`;
                resultDiv.classList.add('alert-success');
            } else if (score >= 10) {
                resultDiv.innerHTML = `<strong>${score}/20 — Неплохо ⚠️</strong><br>Есть что улучшить — посмотри правила!`;
                resultDiv.classList.add('alert-warning');
            } else {
                resultDiv.innerHTML = `<strong>${score}/20 — Опасно! 🔴</strong><br>Срочно изучи правила и статистику!`;
                resultDiv.classList.add('alert-danger');
            }
        }
    </script>
</body>
